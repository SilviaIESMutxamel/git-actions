name: Resumen de la práctica - actions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  resumen:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Generar resumen
        run: |
          echo "# Resumen automatico del repositorio" > RESUMEN.md
          echo "" >> RESUMEN.md
          echo "Fecha de generacion:" >> RESUMEN.md
          date >> RESUMEN.md
          echo "" >> RESUMEN.md
          echo "Ultimo commit:" >> RESUMEN.md
          git log -1 --oneline >> RESUMEN.md
          echo "" >> RESUMEN.md
          echo "Archivos del repositorio:" >> RESUMEN.md
          ls >> RESUMEN.md

      - name: Mostrar resumen creado
        run: |
          cat RESUMEN.md